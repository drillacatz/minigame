<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MINIVERSE – A collection of browser mini-games. No downloads. Just play.">
  <title>MINIVERSE</title>
  <script>
    try {
      var t = localStorage.getItem('miniverse_theme_v1');
      document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
    } catch (e) {}
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/extras.css">
</head>
<body>

  <header class="site-header" role="banner">
    <div class="container site-header__inner">
      <a href="index.html" class="site-logo" aria-label="Miniverse home">
        <span class="site-logo__bracket">[</span>MINI<span class="site-logo__accent">VERSE</span><span class="site-logo__bracket">]</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <div class="site-nav__icon-group">
          <button type="button" class="site-nav__icon-btn" id="js-theme-toggle" aria-label="Switch to light theme" aria-pressed="false">
            <svg class="icon icon--theme-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="display:none">
              <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
            <svg class="icon icon--theme-moon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button type="button" class="site-nav__icon-btn" id="js-sound-toggle" aria-label="Mute sound" aria-pressed="false">
            <svg class="icon icon--sound-on" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M16.5 12c0-1.77-.77-3.29-2-4.32v8.64c1.23-1.03 2-2.55 2-4.32z" opacity=".85"/><path d="M14.5 4.97v2.06c2.89.86 5 3.54 5 6.97s-2.11 6.11-5 6.97v2.06c4.01-.91 7-4.49 7-9.03s-2.99-8.12-7-9.03z" opacity=".6"/>
            </svg>
            <svg class="icon icon--sound-off" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" style="display:none">
              <path d="M3 9v6h4l5 5V4L7 9H3z"/><path d="M19.5 7.5l-7 7M12.5 7.5l7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/>
            </svg>
          </button>
        </div>
        <a href="https://github.com/drillacatz/minigame" target="_blank" rel="noopener noreferrer"
           class="site-nav__github" aria-label="GitHub repository" data-sfx="click">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
        </a>
      </nav>
    </div>
    <div class="site-header__scan" aria-hidden="true"></div>
  </header>

  <main class="site-main" role="main">

    <section class="hero" aria-labelledby="hero-title">
      <div class="container hero__inner">
        <h1 class="hero__title" id="hero-title">MINIVERSE</h1>
        <p class="hero__sub">A growing collection of browser mini-games.<br>No downloads. No installs. Just play.</p>
      </div>
      <div class="hero__grid-deco" aria-hidden="true">
        <div class="hero__grid-line"></div>
        <div class="hero__grid-line"></div>
        <div class="hero__grid-line"></div>
      </div>
    </section>

    <section class="games-section" id="games" aria-labelledby="games-title">
      <div class="container">
        <header class="section-header">
          <p class="section-header__eyebrow">// GAME LIBRARY</p>
          <h2 class="section-header__title" id="games-title">SELECT GAME</h2>
        </header>
        <div class="games-grid" id="js-games-grid" role="list" aria-label="Available games"></div>
      </div>
    </section>

  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="container site-footer__inner">
      <p class="site-footer__copy">&copy; 2026 Drillacatz &mdash; Minigame</p>
    </div>
  </footer>

  <div class="launch-modal hidden" id="js-launch-modal"
       role="dialog" aria-modal="true" aria-labelledby="js-modal-title">
    <div class="launch-modal__backdrop" id="js-modal-backdrop"></div>
    <div class="launch-modal__box">
      <button class="launch-modal__close" id="js-modal-close"
              aria-label="Close" data-sfx="click">&times;</button>

      <header class="launch-modal__header">
        <h2 class="launch-modal__title" id="js-modal-title"></h2>
        <p  class="launch-modal__tip"   id="js-modal-tip"></p>
      </header>

      <p class="launch-modal__prompt">// TAP A DIFFICULTY TO BEGIN</p>

      <div class="launch-modal__diffs" id="js-modal-diffs"></div>
    </div>
  </div>

  <script src="js/data/games.js"></script>
  <script src="js/overlay.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/main.js"></script>

</body>
</html>

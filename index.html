<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MINIVERSE – A collection of browser mini-games. No downloads. Just play.">
  <title>MINIVERSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/extras.css">
</head>
<body>

  <!-- SITE HEADER -->
  <header class="site-header" role="banner">
    <div class="container site-header__inner">
      <a href="index.html" class="site-logo" aria-label="Miniverse home">
        <span class="site-logo__bracket">[</span>MINI<span class="site-logo__accent">VERSE</span><span class="site-logo__bracket">]</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="#games" class="site-nav__link">GAMES</a>
        <a href="https://github.com/drillacatz/minigame" target="_blank" rel="noopener noreferrer" class="site-nav__link site-nav__link--ghost">GITHUB</a>
      </nav>
    </div>
    <div class="site-header__scan" aria-hidden="true"></div>
  </header>

  <!-- MAIN -->
  <main class="site-main" role="main">

    <!-- HERO -->
    <section class="hero" aria-labelledby="hero-title">
      <div class="container hero__inner">
        <p class="hero__eyebrow">// WELCOME TO</p>
        <h1 class="hero__title" id="hero-title">MINIVERSE</h1>
        <p class="hero__sub">A growing collection of browser mini-games.<br>No downloads. No installs. Just play.</p>
        <a href="#games" class="hero__cta">EXPLORE GAMES &darr;</a>
      </div>
      <div class="hero__grid-deco" aria-hidden="true">
        <div class="hero__grid-line"></div>
        <div class="hero__grid-line"></div>
        <div class="hero__grid-line"></div>
      </div>
    </section>

    <!-- GAMES GRID -->
    <section class="games-section" id="games" aria-labelledby="games-title">
      <div class="container">
        <header class="section-header">
          <p class="section-header__eyebrow">// GAME LIBRARY</p>
          <h2 class="section-header__title" id="games-title">SELECT GAME</h2>
        </header>
        <div class="games-grid" id="js-games-grid" role="list" aria-label="Available games">
          <!-- Populated by the inline script below -->
        </div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="container site-footer__inner">
      <p class="site-footer__copy">
        &copy; <span id="js-year"></span>&nbsp;MINIVERSE &mdash; Pure HTML / CSS / JS
      </p>
      <nav class="site-footer__links" aria-label="Footer">
        <a href="https://github.com/drillacatz/minigame" target="_blank" rel="noopener noreferrer">GitHub &nearr;</a>
      </nav>
    </div>
  </footer>

  <!-- ============================================================
       GAME REGISTRY + RENDERER  (all inline — zero external deps)
       To add a new game: copy one object inside GAMES and edit it.
       ============================================================ -->
  <script>
  (function () {
    'use strict';

    /* ----------------------------------------------------------
       GAMES LIST — edit this to add / remove game cards
       ---------------------------------------------------------- */
    var GAMES = [
      {
        title:     'Direction Dash',
        subtitle:  'Stellar Impulse',
        thumbnail: 'assets/images/direction-dash.svg',
        url:       'games/direction-dash/index.html',
        accent:    '#00d4ff',
        locked:    false
      },
      {
        title:     'Coming Soon',
        subtitle:  '???',
        thumbnail: 'assets/images/coming-soon.svg',
        url:       null,
        accent:    '#ff2d8b',
        locked:    true
      },
      {
        title:     'Coming Soon',
        subtitle:  '???',
        thumbnail: 'assets/images/coming-soon.svg',
        url:       null,
        accent:    '#9d4eff',
        locked:    true
      }
    ];

    /* ----------------------------------------------------------
       HTML escaping helper
       ---------------------------------------------------------- */
    function esc(str) {
      if (!str) return '';
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    /* ----------------------------------------------------------
       Build one card element
       ---------------------------------------------------------- */
    function buildCard(game) {
      var isPlayable = !game.locked && !!game.url;
      var tag  = isPlayable ? 'a' : 'div';
      var card = document.createElement(tag);

      card.className = 'game-card' + (game.locked ? ' game-card--locked' : '');
      card.setAttribute('role', 'listitem');

      if (isPlayable) {
        card.href = game.url;
        card.setAttribute('aria-label', 'Play ' + game.title);
      }

      if (game.accent) {
        card.style.setProperty('--card-accent', game.accent);
      }

      var lockedBadge = game.locked
        ? '<div class="game-card__locked-badge">COMING SOON</div>'
        : '';

      card.innerHTML =
        '<img' +
          ' class="game-card__img"' +
          ' src="' + esc(game.thumbnail) + '"' +
          ' alt="' + esc(game.title) + '"' +
          ' loading="lazy"' +
          ' onerror="this.src=\'assets/images/coming-soon.svg\'"' +
        '>' +
        '<div class="game-card__banner">' +
          '<p class="game-card__title">' + esc(game.title)    + '</p>' +
          '<p class="game-card__sub">'   + esc(game.subtitle) + '</p>' +
        '</div>' +
        lockedBadge;

      return card;
    }

    /* ----------------------------------------------------------
       Render cards into the grid
       ---------------------------------------------------------- */
    function render() {
      var grid = document.getElementById('js-games-grid');
      if (!grid) return;

      grid.innerHTML = '';

      if (!GAMES || GAMES.length === 0) {
        grid.innerHTML = '<p class="games-grid__placeholder">No games yet — check back soon!</p>';
        return;
      }

      var frag = document.createDocumentFragment();
      for (var i = 0; i < GAMES.length; i++) {
        frag.appendChild(buildCard(GAMES[i]));
      }
      grid.appendChild(frag);

      /* Year in footer */
      var yr = document.getElementById('js-year');
      if (yr) yr.textContent = new Date().getFullYear();
    }

    /* ----------------------------------------------------------
       Run after DOM is ready
       ---------------------------------------------------------- */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', render);
    } else {
      render();
    }

  }());
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="Direction Dash — gameplay">
  <title>Direction Dash – Play</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/game.css">
</head>
<body class="game-body">

  <div class="timer-bar-wrap" role="progressbar" aria-label="Time remaining" aria-valuemin="0" aria-valuemax="100">
    <div class="timer-bar__fill" id="js-timer-fill"></div>
  </div>

  <div class="hud-top">
    <a href="../../index.html" class="hud-back" aria-label="Back to Miniverse home" data-sfx="click">‹ MINIVERSE</a>
    <div class="hud-stats">
      <div class="hud-stat">
        <span class="hud-stat__label">DIFFICULTY</span>
        <span class="hud-stat__value" id="js-diff-label">—</span>
      </div>
      <div class="hud-stat hud-stat--time">
        <span class="hud-stat__label">TIME</span>
        <span class="hud-stat__value" id="js-timer-label">9.0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-stat__label">PROGRESS</span>
        <span class="hud-stat__value" id="js-progress">0/0</span>
      </div>
      <div class="hud-stat">
        <span class="hud-stat__label">ERRORS</span>
        <span class="hud-stat__value hud-stat__value--errors" id="js-errors">0</span>
      </div>
    </div>
    <button class="hud-theme-btn" id="js-theme-toggle" aria-label="Toggle theme" data-sfx="click">
      <span class="hud-theme-btn__icon" id="js-theme-icon">◑</span>
    </button>
  </div>

  <div class="game-arena" id="js-game-area">
    <div class="grid" id="js-grid" role="grid" aria-label="Direction input grid"></div>

    <div class="panel" id="js-panel-menu" role="dialog" aria-modal="true" aria-labelledby="js-menu-title">
      <div class="panel__box menu-box">
        <header class="menu-box__header">
          <h1 class="menu-box__title" id="js-menu-title">DIRECTION<span class="menu-box__title-accent">DASH</span></h1>
          <p class="menu-box__tip">Match each glowing arrow before time runs out. Wrong move = &minus;1 second.</p>
        </header>
        <section class="menu-diff" aria-labelledby="js-menu-diff-heading">
          <h2 class="menu-section-heading" id="js-menu-diff-heading">SELECT DIFFICULTY</h2>
          <div class="menu-diff__cards">
            <button type="button" class="diff-card diff-card--ezpz" data-diff="ezpz" data-sfx="click" aria-pressed="false">
              <span class="diff-card__name">EZPZ</span>
              <span class="diff-card__meta">3×3 · 9s</span>
            </button>
            <button type="button" class="diff-card diff-card--whatever" data-diff="whatever" data-sfx="click" aria-pressed="false">
              <span class="diff-card__name">WHATEVER</span>
              <span class="diff-card__meta">4×4 · 9s</span>
            </button>
            <button type="button" class="diff-card diff-card--master" data-diff="master" data-sfx="click" aria-pressed="false">
              <span class="diff-card__name">MASTER</span>
              <span class="diff-card__meta">5×5 · 9s</span>
            </button>
          </div>
        </section>
        <section class="menu-ranking" aria-labelledby="js-menu-rank-heading">
          <h2 class="menu-section-heading" id="js-menu-rank-heading">BEST SCORES</h2>
          <ol class="ranking-list" id="js-menu-ranking" aria-live="polite"></ol>
        </section>
        <button type="button" class="game-btn game-btn--primary menu-box__start" id="js-btn-start" data-sfx="click">START GAME</button>
      </div>
    </div>

    <div class="panel panel--transparent" id="js-panel-countdown" role="status" aria-live="assertive" aria-label="Countdown">
      <div class="countdown-display">
        <span class="countdown-num" id="js-countdown-num">3</span>
      </div>
    </div>

    <div class="panel" id="js-panel-result" role="dialog" aria-modal="true" aria-labelledby="js-result-title">
      <div class="panel__box result-box">
        <h2 class="result-title" id="js-result-title">CLEARED!</h2>
        <div class="result-stats" id="js-result-stats"></div>
        <div class="result-leaderboard" id="js-result-leaderboard"></div>
        <div class="result-actions">
          <button type="button" class="game-btn game-btn--primary" id="js-btn-restart" data-sfx="click">PLAY AGAIN</button>
          <button type="button" class="game-btn game-btn--secondary" id="js-btn-mainmenu" data-sfx="click">CHANGE DIFFICULTY</button>
        </div>
      </div>
    </div>
  </div>

  <div class="controls-area">
    <div class="dpad hidden" id="js-dpad" aria-label="Directional pad">
      <div class="dpad__row">
        <button class="dpad__btn" data-dir="up" aria-label="Up">▲</button>
      </div>
      <div class="dpad__row dpad__row--mid">
        <button class="dpad__btn" data-dir="left" aria-label="Left">◄</button>
        <div class="dpad__center" aria-hidden="true">●</div>
        <button class="dpad__btn" data-dir="right" aria-label="Right">►</button>
      </div>
      <div class="dpad__row">
        <button class="dpad__btn" data-dir="down" aria-label="Down">▼</button>
      </div>
    </div>

    <div class="kb-hint" id="js-kb-hint" aria-label="Keyboard controls: W A S D">
      <div class="kb-hint__row"><kbd class="key" data-key="w">W</kbd></div>
      <div class="kb-hint__row">
        <kbd class="key" data-key="a">A</kbd>
        <kbd class="key" data-key="s">S</kbd>
        <kbd class="key" data-key="d">D</kbd>
      </div>
    </div>

    <div class="swipe-hint hidden" id="js-swipe-hint" aria-label="Swipe to input direction">
      <div class="swipe-hint__icon">↕ ↔</div>
      <p class="swipe-hint__label">SWIPE TO INPUT</p>
    </div>

    <div class="controls-footer">
      <button class="mode-toggle-btn" id="js-mode-toggle" aria-label="Switch input mode" data-sfx="click">
        <span id="js-mode-icon" aria-hidden="true"></span>
        <span id="js-mode-label">WASD</span>
      </button>
    </div>
  </div>

  <script src="../../js/audio.js"></script>
  <script>MiniverseAudio.init({ basePath: '../../' });</script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/input.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
